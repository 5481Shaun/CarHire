<div class="container-fluid">
  <div class="row vh-100 d-flex justify-content-center">
    <div class="col-12 align-self-center">
      <div class="card-body">
        <div class="row">
          <div class="col-lg-4 mx-auto">
            <div class="card">
              <div class="card-body p-0 bg-black auth-header-box rounded-top">
                <div class="text-center p-3">
                  <a routerLink="/" class="logo logo-admin">
                    <img
                      src="assets/images/rent.png"
                      height="50"
                      alt="logo"
                      class="auth-logo"
                    />
                  </a>

                  <p class="text-muted fw-medium mb-0">
                    Sign in to CarHire App.
                  </p>
                </div>
              </div>
              <div class="card-body pt-0">
             
                <form
                  [formGroup]="loginForm"
                  class="my-4 needs-validation"
                  action="index.html"
                >
                 
                <div  class="error-message">
                 
                  
                </div>
                  <div class="form-group mb-2 ">
                    <label class="form-label" for="username">Username</label>
                    <input
                      type="text"
                      formControlName="username"
                      
                      class="form-control"
                      id="username"
                      required
                    />
                    <div class="invalid-feedback">Field required.</div>
                  </div>


                  <!--end form-group-->

                  <div class="form-group">
                    <label class="form-label" for="userpassword"
                      >Password</label
                    >
                    
                    <input
                    type="password"
                    formControlName="password"
                   
                    class="form-control"
                    id="password"
                    required
                  />
                  <div class="invalid-feedback">Field required.</div>
                  </div>
                  <!--end form-group-->

                  <div class="form-group row mt-3">
                    <div class="col-sm-6">
                      <div class="form-check form-switch form-switch-success">
                        <input
                          class="form-check-input"
                          type="checkbox"
                          id="customSwitchSuccess"
                        />
                        <label
                          class="form-check-label"
                          for="customSwitchSuccess"
                          >Remember me</label
                        >
                      </div>
                    </div>
                    <!--end col-->
                   
                    <!--end col-->
                  </div>
                  <!--end form-group-->

                  <div class="form-group mb-0 row">
                    <div class="col-12">
                      <div class="d-grid mt-3">
                        <button class="btn btn-primary" (click)="login()" type="submit">
                          Log In <i class="fas fa-sign-in-alt ms-1"></i>
                        </button>
                      </div>
                    </div>
                    <!--end col-->
                  </div>
                  <!--end form-group-->
                </form>
                <!--end form-->
              </div>
              <!--end card-body-->
            </div>
            <!--end card-->
          </div>
          <!--end col-->
        </div>
        <!--end row-->
      </div>
      <!--end card-body-->
    </div>
    <!--end col-->
  </div>
  <!--end row-->
</div>
